<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROVIQ - الملف الشخصي</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
background:#020617;
color:white;
padding:20px;
}
.container{
max-width:500px;
margin:auto;
background:rgba(255,255,255,.05);
padding:25px;
border-radius:18px;
}
h2{text-align:center;margin-bottom:20px;}
.profile-pic{
width:100px;height:100px;border-radius:50%;object-fit:cover;
margin:auto;display:block;
}
input,textarea{
width:100%;padding:12px;margin:10px 0;
border:none;border-radius:12px;
background:rgba(255,255,255,.08);color:white;
}
button{
width:100%;padding:12px;border:none;border-radius:12px;
background:linear-gradient(90deg,#1ea7ff,#8a2eff);
color:white;font-weight:bold;cursor:pointer;margin-top:10px;
}
</style>
</head>
<body>
<div class="container">
<h2>👤 الملف الشخصي</h2>
<img src="/static/profiles/default.png" class="profile-pic">
<label>اسم المستخدم</label>
<input type="text" value="User">
<label>البريد الإلكتروني</label>
<input type="email" value="user@gmail.com" readonly>
<label>الحالة</label>
<textarea placeholder="اكتب حالتك هنا..."></textarea>
<button>حفظ التغييرات</button>
</div>
</body>
</html>
