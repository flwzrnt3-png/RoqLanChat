<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ROVIQ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top left,#5b21ff 0%,transparent 35%),
radial-gradient(circle at bottom right,#006eff 0%,transparent 35%),
#040816;
color:white;
overflow:hidden;
position:relative;
}

#langBtn{
position:absolute;
top:20px;
right:20px;
background:#111827;
color:white;
border:1px solid #444;
padding:10px 15px;
border-radius:12px;
cursor:pointer;
font-size:14px;
}

.container{
width:90%;
max-width:400px;
text-align:center;
}

.logo{
width:75px;
height:75px;
margin:auto;
border-radius:22px;
background:linear-gradient(135deg,#25b8ff,#8a2eff);
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
font-weight:bold;
color:white;
box-shadow:
0 0 25px rgba(138,46,255,.7),
0 0 45px rgba(30,167,255,.5);
}

.app-name{
font-size:42px;
font-weight:bold;
letter-spacing:4px;
margin-top:15px;
}

.tagline{
margin-top:10px;
font-size:18px;
color:#cfcfcf;
}

form{
margin-top:35px;
}

input{
width:100%;
padding:17px;
margin-bottom:15px;
background:#101827;
border:1px solid #25324b;
border-radius:18px;
color:white;
font-size:16px;
}

input:focus{
outline:none;
border-color:#8a2eff;
}

.login-btn{
width:100%;
padding:17px;
border:none;
border-radius:20px;
font-size:20px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#1ea7ff,#8a2eff);
color:white;
}

.register-btn{
display:block;
margin-top:15px;
width:100%;
padding:17px;
border-radius:20px;
border:2px solid #7a4cff;
background:rgba(255,255,255,.03);
color:white;
text-decoration:none;
font-size:18px;
}

.forgot{
margin-top:25px;
}

.forgot a{
color:#33a9ff;
text-decoration:none;
font-size:16px;
}

</style>

</head>

<body>

<button id="langBtn" onclick="toggleLanguage()">
English
</button>

<div class="container">

<div class="logo">
R
</div>

<div class="app-name">
ROVIQ
</div>

<div class="tagline">
Connect • Chat • Discover
</div>

<form method="POST">

<input
type="text"
name="username"
placeholder="اسم المستخدم أو البريد الإلكتروني"
required>

<input
type="password"
name="password"
placeholder="كلمة المرور"
required>

<button class="login-btn" type="submit">
تسجيل الدخول
</button>

</form>

<a href="/register" class="register-btn">
إنشاء حساب جديد
</a>

<div class="forgot">
<a href="/forgot-password">
نسيت كلمة المرور؟
</a>
</div>

</div>

<script>

let arabic = true;

function toggleLanguage(){

if(arabic){

document.querySelector(".tagline").innerText =
"Connect • Chat • Discover";

document.querySelector('input[name="username"]').placeholder =
"Username or Email";

document.querySelector('input[name="password"]').placeholder =
"Password";

document.querySelector(".login-btn").innerText =
"Login";

document.querySelector(".register-btn").innerText =
"Create Account";

document.querySelector(".forgot a").innerText =
"Forgot Password?";

document.getElementById("langBtn").innerText =
"العربية";

document.documentElement.dir = "ltr";
document.documentElement.lang = "en";

}else{

document.querySelector(".tagline").innerText =
"تواصل • دردش • اكتشف";

document.querySelector('input[name="username"]').placeholder =
"اسم المستخدم أو البريد الإلكتروني";

document.querySelector('input[name="password"]').placeholder =
"كلمة المرور";

document.querySelector(".login-btn").innerText =
"تسجيل الدخول";

document.querySelector(".register-btn").innerText =
"إنشاء حساب جديد";

document.querySelector(".forgot a").innerText =
"نسيت كلمة المرور؟";

document.getElementById("langBtn").innerText =
"English";

document.documentElement.dir = "rtl";
document.documentElement.lang = "ar";

}

arabic = !arabic;

}

</script>

</body>
</html>
