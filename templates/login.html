<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROVIQ - تسجيل الدخول</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
height:100vh;
background:linear-gradient(135deg,#020617,#0f172a,#1e1b4b);
color:white;
display:flex;
align-items:center;
justify-content:center;
}
.container{
background:#1e293b;
padding:30px;
border-radius:18px;
width:350px;
box-shadow:0 0 30px rgba(0,0,0,.5);
}
h2{text-align:center;margin-bottom:20px;}
.input-group{margin-bottom:15px;position:relative;}
input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#0f172a;
color:white;
}
input:focus{outline:2px solid #2563eb;}
.eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;}
button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
color:white;
background:linear-gradient(90deg,#2563eb,#7c3aed);
margin-top:10px;
}
button:hover{opacity:.9;}
.link{text-align:center;margin-top:12px;}
.error{color:#f87171;font-size:13px;margin-top:8px;text-align:center;}
.success{color:#22c55e;font-size:13px;margin-top:8px;text-align:center;}
.loader{border:4px solid #1e293b;border-top:4px solid #2563eb;border-radius:50%;width:30px;height:30px;animation:spin 1s linear infinite;margin:auto;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.theme-toggle{position:absolute;top:20px;left:20px;cursor:pointer;font-size:18px;}
</style>
</head>
<body>

<div class="container">
<h2>🔑 تسجيل الدخول</h2>

<form method="POST" action="/login">
<div class="input-group">
<input type="email" name="email" placeholder="📬 بريد Gmail" required>
</div>

<div class="input-group">
<input type="text" name="otp" placeholder="🔢 أدخل كود التحقق من البوت" required>
</div>

<button type="submit">تسجيل الدخول</button>
</form>

<div class="link">
<a href="/register">إنشاء حساب جديد</a>
</div>

<div class="error" id="error"></div>
<div class="success" id="success"></div>
<div class="loader" id="loader" style="display:none;"></div>
</div>

<div class="theme-toggle" onclick="toggleTheme()">🌙</div>

<script>
// مؤشر تحميل عند الضغط
const form = document.querySelector("form");
const loader = document.getElementById("loader");
form.addEventListener("submit", () => {
  loader.style.display = "block";
});

// تبديل الثيم
function toggleTheme(){
  document.body.classList.toggle("light");
}
</script>

</body>
  </html>
