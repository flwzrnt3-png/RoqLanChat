<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ROVIQ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:
radial-gradient(circle at top left,#6a00ff 0%,transparent 35%),
radial-gradient(circle at bottom right,#008cff 0%,transparent 35%),
#020617;
color:white;
}

.container{
width:90%;
max-width:420px;
text-align:center;
}

#langBtn{
position:fixed;
top:20px;
right:20px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.15);
color:white;
padding:12px 18px;
border-radius:16px;
cursor:pointer;
font-size:15px;
}

.logo{
width:95px;
height:95px;
margin:auto;
border-radius:28px;
background:linear-gradient(135deg,#1ea7ff,#8a2eff);
display:flex;
justify-content:center;
align-items:center;
font-size:52px;
font-weight:bold;
box-shadow:
0 0 35px rgba(138,46,255,.7),
0 0 60px rgba(30,167,255,.5);
}

.app-name{
font-size:38px;
font-weight:bold;
letter-spacing:5px;
margin-top:18px;
}

.tagline{
margin-top:10px;
font-size:18px;
color:#d0d0d0;
}

form{
margin-top:35px;
}

input{
width:100%;
padding:18px;
margin-bottom:16px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
color:white;
font-size:16px;
}

input:focus{
outline:none;
border-color:#8a2eff;
}

.login-btn{
width:100%;
padding:18px;
border:none;
border-radius:20px;
font-size:20px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#1ea7ff,#8a2eff);
color:white;
}

.register-btn{
display:block;
margin-top:15px;
width:100%;
padding:18px;
border-radius:20px;
border:2px solid #7a4cff;
background:rgba(255,255,255,.03);
text-decoration:none;
color:white;
font-size:18px;
}

.forgot{
margin-top:22px;
}

.forgot a{
color:#3db2ff;
text-decoration:none;
}

</style>

</head>

<body>

<button id="langBtn" onclick="toggleLanguage()">
English
</button>

<div class="container">

<div class="logo">
R
</div>

<div class="app-name">
ROVIQ
</div>

<div class="tagline" id="tagline">
تواصل • دردش • اكتشف
</div>

<form method="POST">

<input
id="user"
type="text"
name="username"
placeholder="اسم المستخدم أو البريد الإلكتروني"
required>

<input
id="pass"
type="password"
name="password"
placeholder="كلمة المرور"
required>

<button class="login-btn" id="loginBtn" type="submit">
تسجيل الدخول
</button>

</form>

<a href="/register" class="register-btn" id="registerBtn">
إنشاء حساب جديد
</a>

<div class="forgot">
<a href="/forgot-password" id="forgot">
نسيت كلمة المرور؟
</a>
</div>

</div>

<script>

let arabic = true;

function toggleLanguage(){

if(arabic){

document.documentElement.dir="ltr";

document.getElementById("tagline").innerText =
"Connect • Chat • Discover";

document.getElementById("user").placeholder =
"Username or Email";

document.getElementById("pass").placeholder =
"Password";

document.getElementById("loginBtn").innerText =
"Login";

document.getElementById("registerBtn").innerText =
"Create Account";

document.getElementById("forgot").innerText =
"Forgot Password?";

document.getElementById("langBtn").innerText =
"العربية";

}else{

document.documentElement.dir="rtl";

document.getElementById("tagline").innerText =
"تواصل • دردش • اكتشف";

document.getElementById("user").placeholder =
"اسم المستخدم أو البريد الإلكتروني";

document.getElementById("pass").placeholder =
"كلمة المرور";

document.getElementById("loginBtn").innerText =
"تسجيل الدخول";

document.getElementById("registerBtn").innerText =
"إنشاء حساب جديد";

document.getElementById("forgot").innerText =
"نسيت كلمة المرور؟";

document.getElementById("langBtn").innerText =
"English";

}

arabic = !arabic;

}

</script>

</body>
</html>
