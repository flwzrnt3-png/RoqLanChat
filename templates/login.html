<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOVIQ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top left,#5b21ff 0%,transparent 35%),
radial-gradient(circle at bottom right,#006eff 0%,transparent 35%),
#040816;
color:white;
padding:20px;
}

.container{
width:100%;
max-width:430px;
text-align:center;
}

.logo-box{
margin-bottom:35px;
}

.logo-img{
width:95px;
height:95px;
object-fit:contain;
display:block;
margin:auto;
filter:drop-shadow(0 0 25px rgba(118,77,255,.5));
}

.app-name{
font-size:48px;
font-weight:bold;
letter-spacing:4px;
margin-top:18px;
}

.en{
margin-top:10px;
font-size:18px;
color:#d7d7d7;
}

.ar{
margin-top:12px;
font-size:17px;
color:#9f9f9f;
}

form{
margin-top:35px;
}

input{
width:100%;
padding:16px;
margin-bottom:15px;
background:#111827;
border:1px solid #24324a;
border-radius:18px;
color:white;
font-size:15px;
}

input:focus{
outline:none;
border-color:#8a2eff;
}

.login-btn{
width:100%;
padding:18px;
border:none;
border-radius:20px;
font-size:18px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#1ea7ff,#8a2eff);
color:white;
margin-bottom:15px;
}

.register-btn{
display:block;
width:100%;
padding:18px;
border-radius:20px;
border:2px solid #7044ff;
text-decoration:none;
color:white;
font-size:18px;
transition:.3s;
}

.register-btn:hover{
background:#7044ff22;
}

.footer{
margin-top:25px;
font-size:14px;
color:#9a9a9a;
line-height:1.8;
}

.footer a{
color:#2ea8ff;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<div class="logo-box">

<img
src="/static/logo.png"
class="logo-img"
alt="NOVIQ Logo">

<div class="app-name">
NOVIQ
</div>

<div class="en">
Chat. Share. Connect.
</div>

<div class="ar">
تواصل بحرية • شارك لحظاتك • اكتشف عالمك
</div>

</div>

<form method="POST">

<input
type="text"
name="username"
placeholder="اسم المستخدم أو البريد الإلكتروني"
required>

<input
type="password"
name="password"
placeholder="كلمة المرور"
required>

<button class="login-btn" type="submit">
تسجيل الدخول
</button>

</form>

<a href="/register" class="register-btn">
إنشاء حساب جديد
</a>

<div class="footer">

<a href="/forgot-password">
نسيت كلمة المرور؟
</a>

<br><br>

باستخدام NOVIQ فإنك توافق على شروط الخدمة وسياسة الخصوصية

</div>

</div>

</body>
</html>
