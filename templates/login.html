<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ROVIQ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top left,#5b21ff 0%,transparent 35%),
radial-gradient(circle at bottom right,#006eff 0%,transparent 35%),
#040816;
color:white;
overflow:auto;
}

.container{
width:90%;
max-width:430px;
text-align:center;
padding:30px 0;
}

.logo-box{
margin-bottom:30px;
}

.logo{
width:85px;
height:85px;
margin:auto;
border-radius:25px;
background:linear-gradient(135deg,#25b8ff,#8a2eff);
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
font-weight:bold;
color:white;
box-shadow:
0 0 20px rgba(138,46,255,.6),
0 0 40px rgba(30,167,255,.4);
}

.app-name{
font-size:38px;
font-weight:bold;
letter-spacing:4px;
margin-top:18px;
}

.en{
margin-top:10px;
font-size:17px;
color:#d7d7d7;
}

.ar{
margin-top:10px;
font-size:16px;
color:#a8a8a8;
}

form{
margin-top:30px;
}

input{
width:100%;
padding:16px;
margin-bottom:15px;
background:#111827;
border:1px solid #24324a;
border-radius:18px;
color:white;
font-size:15px;
}

input:focus{
outline:none;
border-color:#8a2eff;
}

.login-btn{
width:100%;
padding:18px;
border:none;
border-radius:20px;
font-size:18px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#1ea7ff,#8a2eff);
color:white;
margin-bottom:15px;
}

.register-btn{
display:block;
width:100%;
padding:18px;
border-radius:20px;
border:2px solid #7044ff;
text-decoration:none;
color:white;
font-size:18px;
background:rgba(255,255,255,0.03);
}

.register-btn:hover{
background:rgba(255,255,255,0.06);
}

.footer{
margin-top:25px;
font-size:14px;
color:#9a9a9a;
}

.footer a{
color:#2ea8ff;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<div class="logo-box">

<div class="logo">
R
</div>

<div class="app-name">
ROVIQ
</div>

<div class="en">
Social Messaging Platform
</div>

<div class="ar">
تواصل مع العالم بطريقة جديدة
</div>

</div>

<form method="POST">

<input
type="text"
name="username"
placeholder="اسم المستخدم أو البريد الإلكتروني"
required>

<input
type="password"
name="password"
placeholder="كلمة المرور"
required>

<button class="login-btn" type="submit">
تسجيل الدخول
</button>

</form>

<a href="/register" class="register-btn">
إنشاء حساب جديد
</a>

<div class="footer">

<br>

<a href="/forgot-password">
نسيت كلمة المرور؟
</a>

<br><br>

باستخدام ROVIQ فإنك توافق على شروط الخدمة وسياسة الخصوصية

</div>

</div>

</body>
</html>
