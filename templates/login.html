<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول - RoqLan Chat</title>

<style>

body{
background:#0b0b0b;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.box{
width:340px;
}

h1{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:12px;
background:#1e1e1e;
border:1px solid #333;
border-radius:12px;
color:white;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
background:#0095f6;
border:none;
border-radius:12px;
color:white;
font-size:16px;
cursor:pointer;
}

a{
color:#0095f6;
text-decoration:none;
}

.register-link{
text-align:center;
margin-top:15px;
}

</style>
</head>

<body>

<div class="box">

<h1>❤️ RoqLan Chat</h1>

<form method="POST">

<input
type="text"
name="username"
placeholder="اسم المستخدم"
required>

<input
type="password"
name="password"
placeholder="كلمة المرور"
required>

<button type="submit">
تسجيل الدخول
</button>

</form>

<div class="register-link">
<a href="/register">إنشاء حساب جديد</a>
</div>

</div>

</body>
</html>
