<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROVIQ - قائمة المستخدمين</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
background:#020617;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}
h2{margin-bottom:20px;}
.search-box{margin-bottom:20px;}
.search-input{width:100%;padding:12px;border:none;border-radius:12px;background:#1e293b;color:white;}
.user{
background:#1e293b;
padding:15px;
margin-bottom:10px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:space-between;
cursor:pointer;
transition:.3s;
}
.user:hover{background:#334155;}
.left{display:flex;align-items:center;gap:12px;}
.profile{width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid #4f46e5;}
.default-profile{width:50px;height:50px;border-radius:50%;background:#4f46e5;color:white;
display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:20px;}
.info{display:flex;flex-direction:column;}
.name{font-size:16px;font-weight:bold;}
.last-msg{font-size:13px;opacity:.8;}
.right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.time{font-size:12px;opacity:.6;}
.unread{background:#2563eb;color:white;font-size:12px;padding:4px 8px;border-radius:12px;}
.status{font-size:12px;opacity:.8;color:#22c55e;}
</style>
</head>
<body>

<h2>المستخدمون</h2>

<div class="search-box">
<input class="search-input" id="search" placeholder="🔍 ابحث عن مستخدم...">
</div>

{% for user,last_msg,time,unread,profile_pic,status in users %}
<a href="/chat/{{ user }}">
<div class="user">
<div class="left">
{% if profile_pic %}
<img class="profile" src="/static/profiles/{{ profile_pic }}">
{% else %}
<div class="default-profile">{{ user[0]|upper }}</div>
{% endif %}
<div class="info">
<div class="name">{{ user }}</div>
<div class="last-msg">{{ last_msg }}</div>
</div>
</div>
<div class="right">
<div class="time">{{ time }}</div>
{% if unread > 0 %}
<div class="unread">{{ unread }}</div>
{% endif %}
<div class="status">{{ status }}</div>
</div>
</div>
</a>
{% endfor %}

<script>
// بحث داخل القائمة
const searchInput = document.getElementById("search");
searchInput.addEventListener("input", () => {
  const filter = searchInput.value.toLowerCase();
  document.querySelectorAll(".user").forEach(user => {
    const name = user.querySelector(".name").innerText.toLowerCase();
    user.style.display = name.includes(filter) ? "flex" : "none";
  });
});
</script>

</body>
</html>
