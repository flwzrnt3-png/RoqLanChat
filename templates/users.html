<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROVIQ - المستخدمين</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
background:#020617;
color:white;
padding:20px;
}
.container{
max-width:500px;
margin:auto;
}
h2{text-align:center;margin-bottom:20px;}
.user{
display:flex;
align-items:center;
justify-content:space-between;
background:rgba(255,255,255,.05);
padding:12px;
border-radius:12px;
margin-bottom:10px;
}
.user img{
width:45px;height:45px;border-radius:50%;object-fit:cover;
}
.info{flex:1;margin-left:12px;}
.name{font-weight:bold;}
.last-msg{font-size:14px;color:#9ca3af;}
.time{font-size:12px;color:#6b7280;}
</style>
</head>
<body>
<div class="container">
<h2>قائمة المستخدمين</h2>

<div class="user">
<img src="/static/profiles/default.png" alt="صورة">
<div class="info">
<div class="name">User1</div>
<div class="last-msg">آخر رسالة...</div>
</div>
<div class="time">10:30</div>
</div>

<div class="user">
<img src="/static/profiles/default.png" alt="صورة">
<div class="info">
<div class="name">User2</div>
<div class="last-msg">آخر رسالة...</div>
</div>
<div class="time">09:15</div>
</div>

</div>
</body>
</html>
