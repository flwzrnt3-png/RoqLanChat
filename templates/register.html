<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<title>إنشاء حساب - RoqLan Chat</title>

<style>
body{
    background:#170024;
    font-family:Arial;
    text-align:center;
    color:white;
    padding-top:80px;
}

.box{
    width:320px;
    margin:auto;
    background:#2a003d;
    padding:20px;
    border-radius:15px;
}

input{
    width:90%;
    padding:12px;
    margin:8px;
    border:none;
    border-radius:10px;
}

button{
    background:#ff1493;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
}

a{
    color:#ff66cc;
}
</style>

</head>
<body>

<div class="box">
<h2>❤️ إنشاء حساب</h2>

<form method="POST">
<input type="text" name="username" placeholder="اسم المستخدم" required>
<input type="password" name="password" placeholder="كلمة المرور" required>
<button type="submit">إنشاء حساب</button>
</form>

<br>

<a href="/">لديك حساب؟ تسجيل الدخول</a>

</div>

</body>
</html>
