<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<title>إنشاء حساب - RoqLan Chat</title>

<style>

body{
background:#0f0f0f;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
width:340px;
}

h1{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:12px;
background:#1e1e1e;
border:1px solid #333;
border-radius:12px;
color:white;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
background:#0095f6;
border:none;
border-radius:12px;
color:white;
font-size:16px;
cursor:pointer;
}

a{
color:#0095f6;
text-decoration:none;
}

.login-link{
text-align:center;
margin-top:15px;
}

</style>

</head>
<body>

<div class="box">

<h1>إنشاء حساب جديد</h1>

<form method="POST" enctype="multipart/form-data">

<input
type="text"
name="username"
placeholder="اسم المستخدم (اليوزر)"
required>

<input
type="password"
name="password"
placeholder="كلمة المرور"
required>

<input
type="date"
name="birth_date"
required>

<input
type="email"
name="email"
placeholder="البريد الإلكتروني"
required>

<input
type="text"
name="full_name"
placeholder="الاسم الظاهر للناس">

<input
type="file"
name="profile_pic"
accept="image/*">

<button type="submit">
إنشاء الحساب
</button>

</form>

<div class="login-link">
<a href="/">لديك حساب؟ تسجيل الدخول</a>
</div>

</div>

</body>
    </html>
