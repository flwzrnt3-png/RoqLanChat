<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إنشاء حساب - ROVIQ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#000814,#0a2472);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.box{
width:100%;
max-width:420px;
background:rgba(255,255,255,0.04);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
border-radius:24px;
padding:30px;
box-shadow:0 0 30px rgba(0,140,255,.2);
}

.logo{
text-align:center;
font-size:42px;
font-weight:bold;
margin-bottom:10px;
color:white;
}

.subtitle{
text-align:center;
color:#aaa;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
margin-bottom:12px;
border:none;
outline:none;
border-radius:14px;
background:#0f172a;
color:white;
font-size:15px;
border:1px solid rgba(255,255,255,.08);
}

input:focus{
border-color:#4f46e5;
}

.file{
background:#111827;
padding:12px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#38bdf8,#7c3aed);
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.02);
}

.login-link{
margin-top:18px;
text-align:center;
}

.login-link a{
color:#60a5fa;
text-decoration:none;
}

.login-link a:hover{
text-decoration:underline;
}

</style>
</head>
<body>

<div class="box">

<div class="logo">ROVIQ</div>

<div class="subtitle">
إنشاء حساب جديد
</div>

<form method="POST" enctype="multipart/form-data">

<input
type="text"
name="username"
placeholder="اسم المستخدم"
required>

<input
type="text"
name="full_name"
placeholder="الاسم الكامل">

<input
type="email"
name="email"
placeholder="البريد الإلكتروني"
required>

<input
type="password"
name="password"
placeholder="كلمة المرور"
required>

<input
type="date"
name="birth_date"
required>

<input
class="file"
type="file"
name="profile_pic"
accept="image/*">

<button type="submit">
إنشاء الحساب
</button>

</form>

<div class="login-link">
<a href="/">
لديك حساب؟ تسجيل الدخول
</a>
</div>

</div>

</body>
</html>
