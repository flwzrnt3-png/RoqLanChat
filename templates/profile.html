<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ROVIQ Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a,#1e1b4b);
min-height:100vh;
color:white;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{

width:100%;
max-width:450px;

background:#0f172a;

border-radius:25px;

padding:30px;

box-shadow:0 0 35px rgba(0,0,0,.4);

text-align:center;

}

.avatar{

width:120px;
height:120px;

border-radius:50%;

background:white;

color:#4f46e5;

display:flex;
align-items:center;
justify-content:center;

font-size:50px;
font-weight:bold;

margin:auto;

border:4px solid #7c3aed;

}

.name{

margin-top:20px;

font-size:28px;
font-weight:bold;

}

.info{

margin-top:25px;

display:flex;
flex-direction:column;

gap:15px;

}

.box{

background:#1e293b;

padding:15px;

border-radius:15px;

}

.label{

font-size:13px;

opacity:.7;

margin-bottom:5px;

}

.value{

font-size:17px;

font-weight:bold;

}

.back{

display:inline-block;

margin-top:25px;

padding:14px 25px;

border-radius:15px;

background:linear-gradient(
90deg,
#2563eb,
#7c3aed
);

color:white;

text-decoration:none;

font-weight:bold;

}

</style>

</head>

<body>

<div class="card">

<div class="avatar">
{{ user[0][0]|upper }}
</div>

<div class="name">
{{ user[0] }}
</div>

<div class="info">

<div class="box">
<div class="label">
البريد الإلكتروني
</div>
<div class="value">
{{ user[1] }}
</div>
</div>

<div class="box">
<div class="label">
تاريخ الميلاد
</div>
<div class="value">
{{ user[2] }}
</div>
</div>

</div>

<a
class="back"
href="/">
العودة
</a>

</div>

</body>
  </html>
