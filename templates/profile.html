<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROVIQ - الملف الشخصي</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
background:#020617;
color:white;
padding:20px;
}
.container{
max-width:500px;
margin:auto;
background:#1e293b;
padding:25px;
border-radius:18px;
box-shadow:0 0 25px rgba(0,0,0,.5);
}
h2{text-align:center;margin-bottom:20px;}
.profile-pic{
width:120px;height:120px;border-radius:50%;object-fit:cover;
border:3px solid #2563eb;margin:auto;display:block;
}
.upload-btn{margin:10px auto;display:block;text-align:center;}
input,textarea,select{
width:100%;padding:12px;margin:10px 0;
border:none;border-radius:12px;background:#0f172a;color:white;
}
button{
width:100%;padding:12px;border:none;border-radius:12px;
background:linear-gradient(90deg,#2563eb,#7c3aed);
color:white;font-weight:bold;cursor:pointer;margin-top:10px;
}
button:hover{opacity:.9;}
.section-title{margin-top:20px;font-size:18px;color:#60a5fa;}
.theme-toggle{position:fixed;bottom:20px;left:20px;cursor:pointer;font-size:18px;}
</style>
</head>
<body>

<div class="container">
<h2>👤 الملف الشخصي</h2>

<img src="/static/profiles/default.png" class="profile-pic" id="profilePic">
<div class="upload-btn">
<input type="file" id="uploadPic">
</div>

<label>اسم المستخدم</label>
<input type="text" id="username" value="Techno">

<label>البريد المرتبط</label>
<input type="email" id="email" value="user@gmail.com" readonly>

<label>الحالة / الوصف</label>
<textarea id="status" placeholder="اكتب حالتك هنا..."></textarea>

<div class="section-title">⚙️ إعدادات الحساب</div>
<button>تغيير كلمة المرور</button>
<button>تسجيل الخروج</button>
<button style="background:#dc2626;">حذف الحساب</button>

<div class="section-title">🎨 الثيمات</div>
<select id="theme">
<option>الوضع الليلي</option>
<option>الوضع النهاري</option>
</select>

<div class="section-title">🔔 الإشعارات</div>
<select id="notifications">
<option>تشغيل</option>
<option>إيقاف</option>
</select>

<div class="section-title">🔒 الأمان</div>
<button>تفعيل التحقق بخطوتين (2FA)</button>
</div>

<div class="theme-toggle" onclick="toggleTheme()">🌙</div>

<script>
function toggleTheme(){
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
