<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROVIQ - المحادثة</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
background:#020617;
color:white;
padding:20px;
}
.container{
max-width:500px;
margin:auto;
}
h2{text-align:center;margin-bottom:20px;}
.messages{
background:rgba(255,255,255,.05);
padding:15px;
border-radius:12px;
height:400px;
overflow-y:auto;
margin-bottom:15px;
}
.msg{
margin-bottom:10px;
}
.sender{font-weight:bold;color:#3db2ff;}
.text{margin-left:10px;}
form{display:flex;}
input{
flex:1;
padding:12px;
border:none;
border-radius:12px;
background:rgba(255,255,255,.08);
color:white;
}
button{
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#1ea7ff,#8a2eff);
color:white;
font-weight:bold;
cursor:pointer;
margin-left:10px;
}
</style>
</head>
<body>
<div class="container">
<h2>المحادثة الخاصة</h2>
<div class="messages">
<div class="msg"><span class="sender">User1:</span><span class="text">مرحبا!</span></div>
<div class="msg"><span class="sender">User2:</span><span class="text">أهلاً بك</span></div>
</div>
<form method="POST">
<input type="text" name="msg" placeholder="اكتب رسالتك هنا..." required>
<button type="submit">إرسال</button>
</form>
</div>
</body>
</html>
