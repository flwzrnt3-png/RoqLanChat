<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ROVIQ Chat V4</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#020617,#0f172a,#1e1b4b);
color:white;
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
height:80px;
background:linear-gradient(90deg,#2563eb,#4f46e5,#7c3aed);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
box-shadow:0 0 30px rgba(0,0,0,.4);
}

.left{
display:flex;
align-items:center;
gap:12px;
}

.profile{
width:55px;
height:55px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
}

.default-profile{
width:55px;
height:55px;
border-radius:50%;
background:white;
color:#4f46e5;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:22px;
}

.userinfo{
display:flex;
flex-direction:column;
}

.username{
font-size:18px;
font-weight:bold;
}

.status{
font-size:12px;
opacity:.9;
}

.logo{
font-size:28px;
font-weight:bold;
letter-spacing:1px;
}

.messages{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:14px;
scroll-behavior:smooth;
}

.messages::-webkit-scrollbar{
width:6px;
}

.messages::-webkit-scrollbar-thumb{
background:#4f46e5;
border-radius:20px;
}

.mine{
display:flex;
justify-content:flex-end;
}

.other{
display:flex;
justify-content:flex-start;
}

.bubble{
max-width:85%;
min-width:100px;
padding:15px 18px;
border-radius:18px;
word-break:break-word;
font-size:16px;
line-height:1.7;
animation:show .25s ease;
box-shadow:0 5px 20px rgba(0,0,0,.2);
}

.mine .bubble{
background:linear-gradient(90deg,#4f46e5,#7c3aed);
border-bottom-right-radius:6px;
}

.other .bubble{
background:#1e293b;
border:1px solid rgba(255,255,255,.08);
border-bottom-left-radius:6px;
}

.sender{
font-size:12px;
opacity:.8;
margin-bottom:6px;
font-weight:bold;
}

.msg-text{
font-size:16px;
line-height:1.7;
}

.time{
font-size:11px;
opacity:.6;
margin-top:6px;
}

.bottom{
padding:15px;
background:#0f172a;
border-top:1px solid rgba(255,255,255,.08);
}

.chat-form{
display:flex;
gap:10px;
}

.msginput{
flex:1;
padding:16px;
border:none;
outline:none;
border-radius:18px;
background:#1e293b;
color:white;
font-size:15px;
}

.msginput:focus{
box-shadow:0 0 0 2px #4f46e5;
}

.sendbtn{
padding:16px 22px;
border:none;
border-radius:18px;
cursor:pointer;
font-weight:bold;
color:white;
background:linear-gradient(90deg,#2563eb,#7c3aed);
transition:.2s;
}

.sendbtn:hover{
transform:scale(1.05);
}

.counter{
font-size:12px;
opacity:.8;
margin-top:8px;
text-align:center;
}

@keyframes show{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="header">

<div class="left">

{% if profile_pic %}

<img class="profile" src="/static/profiles/{{ profile_pic }}">

{% else %}

<div class="default-profile">
{{ current_user[0]|upper }}
</div>

{% endif %}

<div class="userinfo">

<div class="username">
{{ current_user }}
</div>

<div class="status">
🟢 متصل الآن
</div>

</div>

</div>

<div class="logo">
ROVIQ
</div>

</div>

<div class="messages" id="messages">
  {% for user,text in messages %}

{% if user == current_user %}

<div class="mine">

<div class="bubble">

<div class="msg-text">
{{ text }}
</div>

<div class="time">
الآن
</div>

</div>

</div>

{% else %}

<div class="other">

<div class="bubble">

<div class="sender">
{{ user }}
</div>

<div class="msg-text">
{{ text }}
</div>

<div class="time">
الآن
</div>

</div>

</div>

{% endif %}

{% endfor %}

</div>

<div class="bottom">

<form method="POST" class="chat-form">

<input
class="msginput"
name="msg"
placeholder="اكتب رسالة..."
autocomplete="off">

<button
class="sendbtn"
type="submit">
➤
</button>

</form>

<div class="counter">
عدد الرسائل: {{ messages|length }}
</div>

</div>

<script>
const messages=document.getElementById("messages");
messages.scrollTop=messages.scrollHeight;
</script>

</body>
</html>
