<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ROVIQ Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1120;
height:100vh;
display:flex;
flex-direction:column;
color:white;
}

.header{
height:80px;
background:linear-gradient(90deg,#2563eb,#7c3aed);
display:flex;
align-items:center;
padding:0 20px;
box-shadow:0 0 25px rgba(0,0,0,.3);
}

.profile{
width:55px;
height:55px;
border-radius:50%;
object-fit:cover;
margin-left:12px;
border:2px solid white;
}

.userinfo{
display:flex;
flex-direction:column;
}

.username{
font-size:18px;
font-weight:bold;
}

.status{
font-size:12px;
opacity:.8;
}

.messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.mine{
text-align:right;
margin-bottom:15px;
}

.other{
text-align:left;
margin-bottom:15px;
}

.bubble{
display:inline-block;
padding:12px 16px;
border-radius:18px;
max-width:75%;
word-wrap:break-word;
}

.mine .bubble{
background:#7c3aed;
}

.other .bubble{
background:#1e293b;
}

.bottom{
padding:15px;
background:#111827;
display:flex;
gap:10px;
}

.msginput{
flex:1;
padding:14px;
border:none;
border-radius:14px;
background:#1e293b;
color:white;
}

.sendbtn{
padding:14px 20px;
border:none;
border-radius:14px;
background:#2563eb;
color:white;
cursor:pointer;
font-weight:bold;
}

</style>
</head>
<body>

<div class="header">

{% if profile_pic %}
<img class="profile" src="/static/profiles/{{ profile_pic }}">
{% endif %}

<div class="userinfo">
<div class="username">{{ current_user }}</div>
<div class="status">متصل الآن</div>
</div>

</div>

<div class="messages">

{% for user,text in messages %}

{% if user == current_user %}

<div class="mine">
<div class="bubble">
{{ text }}
</div>
</div>

{% else %}

<div class="other">
<div class="bubble">
<b>{{ user }}</b><br>
{{ text }}
</div>
</div>

{% endif %}

{% endfor %}

</div>

<div class="bottom">

<form method="POST" style="display:flex;width:100%;gap:10px;">

<input
class="msginput"
name="msg"
placeholder="اكتب رسالة...">

<button
class="sendbtn"
type="submit">
إرسال
</button>

</form>

</div>

</body>
    </html>
