<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROVIQ - المحادثة الخاصة</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
height:100vh;
background:linear-gradient(135deg,#020617,#0f172a,#1e1b4b);
color:white;
display:flex;
flex-direction:column;
overflow:hidden;
}
a{text-decoration:none;color:white;}
.header{
height:80px;
background:linear-gradient(90deg,#2563eb,#4f46e5,#7c3aed);
display:flex;align-items:center;justify-content:space-between;
padding:0 20px;box-shadow:0 0 30px rgba(0,0,0,.4);
}
.left{display:flex;align-items:center;gap:12px;}
.profile{width:55px;height:55px;border-radius:50%;object-fit:cover;border:3px solid white;}
.default-profile{width:55px;height:55px;border-radius:50%;background:white;color:#4f46e5;
display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:22px;}
.userinfo{display:flex;flex-direction:column;}
.username{font-size:18px;font-weight:bold;}
.status{font-size:12px;opacity:.9;display:flex;align-items:center;gap:6px;}
.online-dot{width:10px;height:10px;background:#22c55e;border-radius:50%;box-shadow:0 0 10px #22c55e;animation:pulse 1.5s infinite;}
@keyframes pulse{0%{transform:scale(1);opacity:1;}50%{transform:scale(1.3);opacity:.7;}100%{transform:scale(1);opacity:1;}}
.logo{font-size:28px;font-weight:bold;}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth;}
.messages::-webkit-scrollbar{width:6px;}
.messages::-webkit-scrollbar-thumb{background:#4f46e5;border-radius:20px;}
.mine{display:flex;justify-content:flex-end;}
.other{display:flex;justify-content:flex-start;}
.bubble{max-width:85%;min-width:100px;padding:15px 18px;border-radius:18px;word-break:break-word;font-size:16px;line-height:1.7;box-shadow:0 5px 20px rgba(0,0,0,.2);}
.mine .bubble{background:linear-gradient(90deg,#4f46e5,#7c3aed);border-bottom-right-radius:6px;}
.other .bubble{background:#1e293b;border:1px solid rgba(255,255,255,.08);border-bottom-left-radius:6px;}
.sender{font-size:12px;opacity:.8;margin-bottom:6px;font-weight:bold;}
.msg-text{font-size:16px;line-height:1.7;}
.time{font-size:11px;opacity:.6;margin-top:6px;text-align:right;}
.bottom{padding:15px;background:#0f172a;border-top:1px solid rgba(255,255,255,.08);}
.chat-form{display:flex;gap:10px;}
.msginput{flex:1;padding:16px;border:none;outline:none;border-radius:18px;background:#1e293b;color:white;font-size:15px;}
.sendbtn{padding:16px 22px;border:none;border-radius:18px;cursor:pointer;font-weight:bold;color:white;background:linear-gradient(90deg,#2563eb,#7c3aed);}
.counter{font-size:12px;opacity:.8;margin-top:8px;text-align:center;}
.typing{font-size:12px;color:#60a5fa;margin-top:5px;text-align:right;font-style:italic;}
</style>
</head>
<body>

<div class="header">
<div class="left">
{% if profile_pic %}
<img class="profile" src="/static/profiles/{{ profile_pic }}">
{% else %}
<div class="default-profile">{{ receiver[0]|upper }}</div>
{% endif %}
<div class="userinfo">
<div class="username">{{ receiver }}</div>
<div class="status"><span class="online-dot"></span> متصل الآن</div>
</div>
</div>
<div class="logo"><a href="/users">⬅</a></div>
</div>

<div class="messages" id="messages">
{% for user,text,time in messages %}
{% if user == current_user %}
<div class="mine">
<div class="bubble">
<div class="msg-text">{{ text }}</div>
<div class="time">{{ time }}</div>
</div>
</div>
{% else %}
<div class="other">
<div class="bubble">
<div class="sender">{{ user }}</div>
<div class="msg-text">{{ text }}</div>
<div class="time">{{ time }}</div>
</div>
</div>
{% endif %}
{% endfor %}
</div>

<div class="bottom">
<form method="POST" class="chat-form">
<input class="msginput" name="msg" placeholder="اكتب رسالة..." autocomplete="off">
<button class="sendbtn" type="submit">➤</button>
</form>
<div class="typing" id="typing"></div>
<div class="counter">عدد الرسائل: {{ messages|length }}</div>
</div>

<script>
const messages = document.getElementById("messages");
messages.scrollTop = messages.scrollHeight;

// مؤشر الكتابة
const input = document.querySelector(".msginput");
const typing = document.getElementById("typing");
input.addEventListener("input", () => {
  if(input.value.trim() !== ""){
    typing.innerText = "يكتب الآن...";
  } else {
    typing.innerText = "";
  }
});
</script>

</body>
  </html>
