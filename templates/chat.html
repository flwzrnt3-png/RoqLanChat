<!DOCTYPE html>
<html dir="rtl">
<head>
    <title>RoqLan Chat</title>
    <style>
        body{margin:0;background:#170024;font-family:Arial;}
        .header{background:#4b0082;color:white;text-align:center;padding:15px;font-size:24px;font-weight:bold;}
        .messages{height:75vh;overflow-y:auto;padding:10px;}
        .bottom{position:fixed;bottom:0;width:100%;background:white;padding:10px;}
        .msginput{width:75%;padding:12px;border-radius:20px;border:1px solid #ccc;}
        .sendbtn{padding:12px 20px;border:none;border-radius:20px;background:#ff1493;color:white;}
        .msg{padding:12px;border-radius:20px;display:inline-block;max-width:70%;color:white;}
    </style>
</head>
<body>
<div class="header">❤️ RoqLan Chat</div>
<div class="messages">
{% for user, text in messages %}
    {% if user == current_user %}
        <div style="text-align:right;margin:15px;">
            <div class="msg" style="background:#8a2be2;"> <b>{{user}}</b><br> {{text}} </div>
        </div>
    {% else %}
        <div style="text-align:left;margin:15px;">
            <div class="msg" style="background:#ff1493;"> <b>{{user}}</b><br> {{text}} </div>
        </div>
    {% endif %}
{% endfor %}
</div>

<div class="bottom">
    <form method="post">
        <input class="msginput" name="msg" placeholder="اكتب رسالة...">
        <button class="sendbtn" type="submit">إرسال</button>
    </form>
</div>
</body>
</html>
