<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ROVIQ - البريد الإلكتروني</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#020617,
#071a52,
#4f46e5
);

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

}

.box{

width:100%;
max-width:430px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.1);

border-radius:30px;

padding:35px;

box-shadow:
0 0 40px rgba(79,70,229,.35);

}

.logo{

font-size:52px;
font-weight:bold;
color:white;

text-align:center;

margin-bottom:10px;

}

.step{

text-align:center;

color:#60a5fa;

font-size:14px;

margin-bottom:10px;

}

.title{

text-align:center;

color:white;

font-size:30px;

font-weight:bold;

margin-bottom:10px;

}

.desc{

text-align:center;

color:#b8c0d4;

margin-bottom:30px;

line-height:1.8;

}

input{

width:100%;

padding:18px;

border:none;

outline:none;

border-radius:18px;

background:#0f172a;

color:white;

font-size:18px;

border:2px solid transparent;

margin-bottom:15px;

}

input:focus{

border-color:#4f46e5;

}

.error{

color:#ff6b6b;

font-size:14px;

margin-bottom:15px;

text-align:center;

}

.info{

color:#9ca3af;

font-size:14px;

text-align:center;

margin-bottom:20px;

line-height:2;

}

button{

width:100%;

padding:18px;

border:none;

border-radius:18px;

cursor:pointer;

font-size:20px;

font-weight:bold;

color:white;

background:
linear-gradient(
90deg,
#38bdf8,
#4f46e5,
#7c3aed
);

}

</style>

</head>
<body>

<div class="box">

<div class="logo">
ROVIQ
</div>

<div class="step">
STEP 4 OF 5
</div>

<div class="title">
البريد الإلكتروني
</div>

<div class="desc">
سيتم إرسال رمز التحقق إلى بريدك الإلكتروني
</div>

<form method="POST" id="form">

<input
type="email"
id="email"
name="email"
placeholder="example@gmail.com"
required>

<div id="error" class="error"></div>

<div class="info">
سنستخدم بريدك لتأكيد ملكية الحساب فقط
</div>

<button type="submit">
إرسال الكود →
</button>

</form>

</div>

<script>

document
.getElementById("form")
.addEventListener("submit", function(e){

let email =
document
.getElementById("email")
.value
.trim();

let regex =
/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(!regex.test(email)){

e.preventDefault();

document
.getElementById("error")
.innerHTML =
"البريد الإلكتروني غير صالح";

}

});

</script>

</body>
</html>
